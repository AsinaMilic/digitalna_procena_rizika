# Standard Next.js deployment for Azure Web App - digitalni-registar-rizika

name: Build and deploy Node.js app to Azure Web App - digitalni-registar-rizika

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -la .next/
          echo "✅ Standard Next.js build completed"

      - name: Create deployment package
        run: |
          # Create deployment package with all necessary files
          echo "Creating deployment package..."
          
          # Create optimized zip excluding unnecessary files
          zip -r release.zip . \
            -x "*.git*" \
            -x "*.env*" \
            -x "node_modules/.cache/*" \
            -x ".next/cache/*" \
            -x "*.log" \
            -x "coverage/*" \
            -x "test/*" \
            -x "tests/*" \
            -x "__tests__/*" \
            -x "*.test.js" \
            -x "*.test.ts" \
            -x "*.spec.js" \
            -x "*.spec.ts" \
            -x "README.md" \
            -x "docs/*"
          
          echo "✅ Deployment package created"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'digitalni-registar-rizika'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8133146ACD6641A587378B32A9DD6468 }}