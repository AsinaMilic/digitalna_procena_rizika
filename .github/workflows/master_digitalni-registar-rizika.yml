# Optimized deployment for Azure Web App - digitalni-registar-rizika

name: Build and deploy Node.js app to Azure Web App - digitalni-registar-rizika

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Create deployment package (optimized)
        run: |
          # Create a clean deployment directory
          mkdir deployment
          
          # Copy only necessary files for production
          cp package*.json deployment/
          cp -r .next deployment/
          cp -r public deployment/
          cp next.config.ts deployment/
          
          # Copy API routes and app directory (excluding dev files)
          cp -r app deployment/
          
          # Copy lib directory for database
          cp -r lib deployment/
          
          # Install only production dependencies
          cd deployment
          npm ci --only=production --ignore-scripts
          
          # Remove unnecessary files to reduce size
          find node_modules -name "*.md" -delete
          find node_modules -name "*.txt" -delete
          find node_modules -name "test*" -type d -exec rm -rf {} + 2>/dev/null || true
          find node_modules -name "*.test.js" -delete
          find node_modules -name "*.spec.js" -delete
          
          # Create optimized zip
          zip -r ../release.zip . -x "*.git*" "*.env*" "node_modules/.cache/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'digitalni-registar-rizika'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8133146ACD6641A587378B32A9DD6468 }}