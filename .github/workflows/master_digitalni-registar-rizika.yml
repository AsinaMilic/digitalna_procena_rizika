# Optimized deployment for Azure Web App - digitalni-registar-rizika

name: Build and deploy Node.js app to Azure Web App - digitalni-registar-rizika

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -la .next/
          echo "Checking if standalone build exists..."
          if [ -d ".next/standalone" ]; then
            echo "✅ Standalone build found"
          else
            echo "ℹ️ No standalone build (normal for default setup)"
          fi

      - name: Create deployment package (standalone)
        run: |
          # Create a clean deployment directory
          mkdir deployment
          
          # Check if standalone build exists
          if [ -d ".next/standalone" ]; then
            echo "Using standalone build..."
            # Copy standalone build
            cp -r .next/standalone/* deployment/
            cp -r .next/static deployment/.next/
            cp -r public deployment/
            
            # Create a simple server.js for standalone
            cat > deployment/server.js << 'EOF'
          const { createServer } = require('http')
          const { parse } = require('url')
          const next = require('next')
          
          const port = process.env.PORT || 3000
          const app = next({ dev: false })
          const handle = app.getRequestHandler()
          
          app.prepare().then(() => {
            createServer(async (req, res) => {
              try {
                const parsedUrl = parse(req.url, true)
                await handle(req, res, parsedUrl)
              } catch (err) {
                console.error('Error occurred handling', req.url, err)
                res.statusCode = 500
                res.end('internal server error')
              }
            }).listen(port, () => {
              console.log(`> Ready on http://localhost:${port}`)
            })
          })
          EOF
          else
            echo "Using regular build..."
            # Copy regular build files
            cp package*.json deployment/
            cp -r .next deployment/
            cp -r public deployment/
            cp next.config.ts deployment/
            cp server.js deployment/
            cp startup.sh deployment/
            cp web.config deployment/
            
            # Copy API routes and app directory
            cp -r app deployment/
            cp -r lib deployment/
            
            # Install production dependencies
            cd deployment
            npm ci --only=production
            
            # Remove unnecessary files to reduce size
            find node_modules -name "*.md" -delete 2>/dev/null || true
            find node_modules -name "*.txt" -delete 2>/dev/null || true
            find node_modules -name "test*" -type d -not -path "*/next/*" -exec rm -rf {} + 2>/dev/null || true
            find node_modules -name "*.test.js" -not -path "*/next/*" -delete 2>/dev/null || true
            find node_modules -name "*.spec.js" -not -path "*/next/*" -delete 2>/dev/null || true
            cd ..
          fi
          
          # Create optimized zip
          cd deployment
          zip -r ../release.zip . -x "*.git*" "*.env*" "node_modules/.cache/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'digitalni-registar-rizika'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8133146ACD6641A587378B32A9DD6468 }}