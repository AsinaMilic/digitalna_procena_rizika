# Optimized deployment for Azure Web App - digitalni-registar-rizika

name: Build and deploy Node.js app to Azure Web App - digitalni-registar-rizika

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -la .next/
          echo "Checking if standalone build exists..."
          if [ -d ".next/standalone" ]; then
            echo "✅ Standalone build found"
          else
            echo "ℹ️ No standalone build (normal for default setup)"
          fi

      - name: Create deployment package (standalone)
        run: |
          # Create a clean deployment directory
          mkdir deployment
          
          # Verify standalone build exists
          if [ -d ".next/standalone" ]; then
            echo "✅ Using standalone build..."
            
            # Copy the standalone server and dependencies
            cp -r .next/standalone/* deployment/
            
            # Copy static files to the correct location
            mkdir -p deployment/.next/static
            cp -r .next/static/* deployment/.next/static/
            
            # Copy public files
            cp -r public deployment/
            
            # The standalone build already includes server.js, so we don't override it
            echo "✅ Standalone deployment package created"
          else
            echo "❌ Standalone build not found - this shouldn't happen with output: 'standalone'"
            exit 1
          fi
          
          # Create optimized zip
          cd deployment
          zip -r ../release.zip . -x "*.git*" "*.env*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'digitalni-registar-rizika'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8133146ACD6641A587378B32A9DD6468 }}